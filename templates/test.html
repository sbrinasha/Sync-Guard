<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Monitor - SyncGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-semibold text-gray-900">MQTT Monitor</h1>
                    <p class="text-sm text-gray-500 mt-1 font-mono">mosquitto_sub -h <span id="broker-host">...</span>
                        -t '#' -v</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <div id="statusIndicator" class="w-2 h-2 rounded-full bg-red-500"></div>
                        <span id="statusText" class="text-sm text-gray-600">Connecting...</span>
                    </div>
                    <a href="/" class="text-sm text-gray-600 hover:text-gray-900 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Dashboard
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- MQTT Monitor -->
        <div class="bg-white rounded-lg border border-gray-200 p-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-lg font-medium text-gray-900">Live Feed</h2>
                    <p class="text-xs text-gray-400 mt-1">All messages received and published on the broker</p>
                </div>
                <button onclick="clearLog()"
                    class="text-xs text-gray-400 hover:text-gray-600 px-2 py-1 border border-gray-200 rounded">Clear</button>
            </div>
            <div id="mqtt-log"
                class="bg-gray-900 rounded-lg p-4 h-[calc(100vh-14rem)] overflow-y-auto font-mono text-xs space-y-0.5">
                <div class="text-gray-500">Waiting for MQTT messages...</div>
            </div>
        </div>

    </main>

    <script>
        const socket = io();

        const TOPIC_COLORS = {
            'syncguard/status': 'text-green-400',
            'syncguard/heartbeat': 'text-purple-400',
            'syncguard/temperature': 'text-blue-400',
            'syncguard/humidity': 'text-cyan-400',
            'syncguard/pressure': 'text-yellow-300',
            'syncguard/rain': 'text-teal-400',
            'syncguard/rain_analog': 'text-teal-300',
            'syncguard/servo/state': 'text-orange-400',
            'syncguard/servo/change-state': 'text-orange-300',
        };

        function addLog(topic, payload, ts) {
            const logDiv = document.getElementById('mqtt-log');
            const color = TOPIC_COLORS[topic] || 'text-gray-400';
            const line = document.createElement('div');
            line.className = 'leading-5';
            line.innerHTML =
                `<span class="text-gray-600 select-none">${ts} </span>` +
                `<span class="${color}">${topic}</span> ` +
                `<span class="text-gray-200">${payload}</span>`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            while (logDiv.children.length > 500) logDiv.removeChild(logDiv.firstChild);
        }

        function clearLog() {
            document.getElementById('mqtt-log').innerHTML =
                '<div class="text-gray-500">Log cleared.</div>';
        }

        function now() {
            return new Date().toLocaleTimeString('en-US', { hour12: false });
        }

        // --- Socket event → raw log lines ---

        socket.on('mqtt_message', (data) => {
            addLog(data.topic, data.payload, data.timestamp || now());
        });

        // --- Connection status indicator ---

        socket.on('connect', () => {
            document.getElementById('statusIndicator').className =
                'w-2 h-2 rounded-full bg-green-500 animate-pulse';
            document.getElementById('statusText').textContent = 'Connected';
        });

        socket.on('disconnect', () => {
            document.getElementById('statusIndicator').className =
                'w-2 h-2 rounded-full bg-red-500';
            document.getElementById('statusText').textContent = 'Disconnected';
        });

        socket.on('config_info', (data) => {
            document.getElementById('broker-host').textContent =
                `${data.mqtt_broker}:${data.mqtt_port}`;
        });
    </script>
</body>

</html>
